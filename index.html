<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Service Officer Lookup</title>

  <style>
    body { margin:0; font-family:"Segoe UI",sans-serif; background:#f5f7fa; }
    header { background:#0b3d91; color:white; padding:20px; text-align:center; font-size:22px; }
    .container { max-width:950px; margin:30px auto; padding:20px; background:white; border-radius:10px; }
    .notice { background:#e8f0fe; border-left:5px solid #0b3d91; padding:12px; margin-bottom:20px; }
    .search-box { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    input, select { padding:10px; border-radius:6px; border:1px solid #ccc; }
    input { flex:1; }
    .card { border:1px solid #ddd; border-radius:8px; padding:15px; margin-bottom:12px; cursor:pointer; }
    .card:hover { background:#f0f4ff; }
    .details { display:none; margin-top:10px; border-top:1px solid #eee; padding-top:10px; }
    .section-title { font-weight:bold; color:#0b3d91; margin-top:10px; }
    .button { display:inline-block; margin-top:10px; padding:8px 12px; background:#0b3d91; color:white; border-radius:6px; font-size:13px; cursor:pointer; }
    .button.disabled { background:gray; cursor:not-allowed; }
    .auth-box { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; }
    .auth-box input { flex:1; }
    .auth-status { font-size:13px; margin-top:5px; }
  </style>
</head>
<body>

<header>
  Public Service Officer Lookup Portal
</header>

<div class="container">

  <div class="auth-box">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <div class="button" onclick="register()">Create Account</div>
    <div class="button" onclick="login()">Login</div>
  </div>
  <div id="authStatus" class="auth-status"></div>

  <div class="notice">
    You must be logged in to request documents.
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search officer name...">
    <select id="stateFilter">
      <option value="">All States</option>
      <option value="SA">South Australia</option>
      <option value="NSW">New South Wales</option>
    </select>
  </div>

  <div id="results"></div>
</div>

<script>
let currentUser = null;

function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  localStorage.setItem(email, password);
  document.getElementById("authStatus").innerText = "Account created. You can now login.";
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const stored = localStorage.getItem(email);

  if (stored === password) {
    currentUser = { email };
    document.getElementById("authStatus").innerText = "Logged in as: " + email;
    displayOfficers(officers);
  } else {
    alert("Invalid login");
  }
}

const officers = [
  {
    name: "John Smith",
    state: "SA",
    rank: "Sergeant",
    station: "Adelaide Central",
    id: "SA1234",
    service: "12 years",
    case: {
      ref: "SA-2023-445",
      court: "Adelaide Magistrates Court",
      status: "Closed",
      outcome: "Resolved"
    }
  }
];

const resultsDiv = document.getElementById("results");

function displayOfficers(list) {
  resultsDiv.innerHTML = "";

  list.forEach((officer, index) => {
    const card = document.createElement("div");
    card.className = "card";

    const buttonClass = currentUser ? "button" : "button disabled";

    card.innerHTML = `
      <strong>${officer.name}</strong> (${officer.state})
      <div class="details" id="details-${index}">

        <div class="section-title">Officer Information</div>
        Rank: ${officer.rank}<br>
        Station: ${officer.station}<br>
        Officer ID: ${officer.id}<br>
        Years of Service: ${officer.service}

        <div class="section-title">Case Information</div>
        Case Ref: ${officer.case.ref}<br>
        Court: ${officer.case.court}<br>
        Status: ${officer.case.status}<br>
        Outcome: ${officer.case.outcome}

        <div class="section-title">Documents</div>
        <div class="${buttonClass}" onclick="requestDocs('${officer.name}')">Request Documents</div>

      </div>
    `;

    card.addEventListener("click", () => {
      const details = document.getElementById(`details-${index}`);
      details.style.display = details.style.display === "block" ? "none" : "block";
    });

    resultsDiv.appendChild(card);
  });
}

function requestDocs(name) {
  if (!currentUser) {
    alert("You must log in to request documents.");
    return;
  }

  alert(`Request sent for ${name}.\nUser Email: ${currentUser.email}\n(Backend needed to send email)`);
}

displayOfficers(officers);
</script>

</body>
</html>

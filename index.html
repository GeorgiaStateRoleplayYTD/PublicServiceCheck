<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officer Lookup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input {
      flex: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .details {
      display: none;
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Police Officer Lookup</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search officer name...">
      <select id="stateFilter">
        <option value="">All States</option>
        <option value="NSW">NSW</option>
        <option value="VIC">VIC</option>
        <option value="QLD">QLD</option>
        <option value="SA">SA</option>
        <option value="WA">WA</option>
        <option value="TAS">TAS</option>
        <option value="NT">NT</option>
        <option value="ACT">ACT</option>
      </select>
    </div>

    <div id="results"></div>
  </div>

  <script>
    const officers = [
      {
        name: "John Smith",
        state: "SA",
        rank: "Sergeant",
        station: "Adelaide Central",
        id: "SA1234"
      },
      {
        name: "Emily Johnson",
        state: "NSW",
        rank: "Constable",
        station: "Sydney CBD",
        id: "NSW5678"
      },
      {
        name: "Michael Brown",
        state: "VIC",
        rank: "Senior Constable",
        station: "Melbourne West",
        id: "VIC9101"
      }
    ];

    const searchInput = document.getElementById("searchInput");
    const stateFilter = document.getElementById("stateFilter");
    const resultsDiv = document.getElementById("results");

    function displayOfficers(list) {
      resultsDiv.innerHTML = "";

      list.forEach((officer, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <strong>${officer.name}</strong> (${officer.state})
          <div class="details" id="details-${index}">
            Rank: ${officer.rank}<br>
            Station: ${officer.station}<br>
            ID: ${officer.id}
          </div>
        `;

        card.addEventListener("click", () => {
          const details = document.getElementById(`details-${index}`);
          details.style.display = details.style.display === "block" ? "none" : "block";
        });

        resultsDiv.appendChild(card);
      });
    }

    function filterOfficers() {
      const search = searchInput.value.toLowerCase();
      const state = stateFilter.value;

      const filtered = officers.filter(o => {
        const matchesName = o.name.toLowerCase().includes(search);
        const matchesState = state === "" || o.state === state;
        return matchesName && matchesState;
      });

      displayOfficers(filtered);
    }

    searchInput.addEventListener("input", filterOfficers);
    stateFilter.addEventListener("change", filterOfficers);

    displayOfficers(officers);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Service Officer Portal</title>

<style>
body { margin:0; font-family:"Segoe UI",sans-serif; background:#f5f7fa; }
header { background:#0b3d91; color:white; padding:18px; display:flex; justify-content:space-between; align-items:center; }
header span { font-size:18px; font-weight:600; }
.container { max-width:1000px; margin:25px auto; padding:20px; background:white; border-radius:10px; }
.auth-box { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px; }
input, select { padding:10px; border-radius:6px; border:1px solid #ccc; }
.button { background:#0b3d91; color:white; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
.button:hover { background:#092f6b; }
.logout { background:#c62828; }
.dashboard { background:#eef3ff; padding:10px; border-radius:6px; margin-bottom:15px; display:none; }
.card { border:1px solid #ddd; border-radius:8px; padding:15px; margin-bottom:12px; cursor:pointer; }
.card:hover { background:#f0f4ff; }
.details { display:none; margin-top:10px; border-top:1px solid #eee; padding-top:10px; }
.section-title { font-weight:bold; color:#0b3d91; margin-top:10px; }
.disabled { background:gray !important; cursor:not-allowed; }
</style>
</head>
<body>

<header>
  <span>Public Service Officer Portal</span>
  <div id="userHeader"></div>
</header>

<div class="container">

<div class="auth-box" id="authBox">
  <input type="email" id="email" placeholder="Government Email">
  <input type="password" id="password" placeholder="Password">
  <div class="button" onclick="register()">Register</div>
  <div class="button" onclick="login()">Login</div>
</div>

<div class="dashboard" id="dashboard">
  <strong>Account Dashboard</strong><br>
  Logged in as: <span id="userEmail"></span><br>
  Access Level: Public User<br>
  <div class="button logout" onclick="logout()">Logout</div>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search officer name...">
</div>

<div id="results"></div>
</div>

<script>
let currentUser = null;

function register(){
  const email = emailEl.value;
  const pass = passwordEl.value;
  if(!email||!pass) return alert("Fill all fields");
  localStorage.setItem(email, pass);
  alert("Account created");
}

function login(){
  const email = emailEl.value;
  const pass = passwordEl.value;
  if(localStorage.getItem(email)===pass){
    currentUser={email};
    updateUI();
  } else alert("Invalid login");
}

function logout(){
  currentUser=null;
  updateUI();
}

function updateUI(){
  const dash = document.getElementById("dashboard");
  const header = document.getElementById("userHeader");

  if(currentUser){
    dash.style.display="block";
    document.getElementById("userEmail").innerText=currentUser.email;
    header.innerHTML = currentUser.email;
  } else {
    dash.style.display="none";
    header.innerHTML = "Not Logged In";
  }
  displayOfficers(officers);
}

const emailEl=document.getElementById("email");
const passwordEl=document.getElementById("password");

const officers=[{
 name:"John Smith", state:"SA", rank:"Sergeant", station:"Adelaide Central", id:"SA1234", service:"12 years",
 case:{ref:"SA-2023-445", court:"Adelaide Magistrates Court", status:"Closed", outcome:"Resolved"}
}];

const resultsDiv=document.getElementById("results");

function displayOfficers(list){
 resultsDiv.innerHTML="";
 list.forEach((o,i)=>{
   const btnClass=currentUser?"button":"button disabled";
   const card=document.createElement("div");
   card.className="card";
   card.innerHTML=`
   <strong>${o.name}</strong>
   <div class="details" id="d${i}">
     <div class="section-title">Officer Info</div>
     ${o.rank}<br>${o.station}<br>ID: ${o.id}<br>
     <div class="section-title">Case</div>
     Ref: ${o.case.ref}<br>${o.case.court}<br>${o.case.status}<br>
     <div class="section-title">Documents</div>
     <div class="${btnClass}" onclick="requestDocs('${o.name}')">Request Documents</div>
   </div>`;

   card.onclick=()=>{
     const d=document.getElementById("d"+i);
     d.style.display=d.style.display==="block"?"none":"block";
   };

   resultsDiv.appendChild(card);
 });
}

function requestDocs(name){
 if(!currentUser) return alert("Login required");

 const subject = encodeURIComponent("Document Request: "+name);
 const body = encodeURIComponent("Officer: "+name+"\nUser: "+currentUser.email);

 window.location.href = `mailto:australiapsc@gmail.com?subject=${subject}&body=${body}`;
}

updateUI();
</script>

</body>
</html>
